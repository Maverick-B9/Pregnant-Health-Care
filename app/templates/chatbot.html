{% extends "base.html" %}

{% block title %}MaaSakhi Assistant - Future Health{% endblock %}

{% block content %}
<div
    style="max-width: 900px; margin: 0 auto; min-height: calc(100vh - 140px); display: flex; flex-direction: column; position: relative;">

    <div class="glass-card"
        style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; height: 100%; position: relative; z-index: 1;">
        <!-- Header -->
        <div
            style="padding: 20px; border-bottom: 1px solid rgba(255, 182, 193, 0.4); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.6);">

            <h3 style="margin: 0; color: var(--primary-color); display: flex; align-items: center; font-size: 1.5rem;">
                <!-- Robot Avatar -->
                <div
                    style="width: 50px; height: 50px; border-radius: 50%; background: white; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: float 6s infinite ease-in-out;">
                    <img src="{{ url_for('static', filename='robot.png') }}" alt="Bot"
                        style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                MaaSakhi Assistant
            </h3>

            <span
                style="font-size: 0.85rem; color: var(--success-color); display: flex; align-items: center; background: white; padding: 5px 12px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <span
                    style="width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 5px var(--success-color);"></span>
                Online
            </span>
        </div>

        <!-- Chat Log -->
        <div id="chatlog"
            style="flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;">
            <div class="bot-message fade-up">
                <div class="message-content">
                    Namaste, {{ user_name if user_name else 'Mom-to-be' }}! 🌸<br>
                    I am your MaaSakhi AI. How are you feeling today?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div
            style="padding: 20px; border-top: 1px solid rgba(255, 182, 193, 0.4); background: rgba(255, 255, 255, 0.6);">
            <div style="display: flex; gap: 15px; position: relative;">
                <textarea id="user_input" class="form-control" rows="1" placeholder="Type your health questions here..."
                    style="margin-bottom: 0; resize: none; border-radius: 25px; padding-right: 60px; border: 2px solid var(--primary-soft); background: white;"></textarea>
                <button onclick="sendMessage()" class="btn-primary"
                    style="border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; padding: 0; position: absolute; right: 5px; top: 5px; box-shadow: none;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Chat Specific Styles */
    .user-message {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        color: white;
        padding: 12px 20px;
        border-radius: 20px 20px 5px 20px;
        max-width: 75%;
        box-shadow: 0 5px 15px rgba(255, 20, 147, 0.2);
        font-size: 1rem;
    }

    .bot-message {
        align-self: flex-start;
        display: flex;
        flex-direction: column;
        max-width: 80%;
    }

    .bot-message .message-content {
        background: white;
        color: var(--text-primary);
        padding: 15px 20px;
        border-radius: 20px 20px 20px 5px;
        border: 1px solid var(--primary-soft);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        font-size: 1rem;
        line-height: 1.5;
    }

    .bot-message strong {
        display: block;
        font-size: 0.8rem;
        color: var(--primary-color);
        margin-bottom: 5px;
        font-weight: 700;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const userInputField = document.getElementById('user_input');
        const chatlog = document.getElementById('chatlog');

        if (userInputField) {
            userInputField.addEventListener('keydown', function (event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage();
                }
            });
        }

        window.displayMessage = function (className, text) {
            if (!chatlog) return;
            const messageDiv = document.createElement('div');
            messageDiv.className = className + ' fade-up';
            // Only add wrapping div if it's not already structured
            messageDiv.innerHTML = `<div class="message-content">${text.replace(/\n/g, '<br>')}</div>`;
            chatlog.appendChild(messageDiv);
            chatlog.scrollTop = chatlog.scrollHeight;
        };

        window.sendMessage = function () {
            if (!userInputField || !chatlog) return;
            let userMessage = userInputField.value.trim();

            if (userMessage) {
                // Display user message
                const userDiv = document.createElement('div');
                userDiv.className = 'user-message fade-up';
                userDiv.textContent = userMessage;
                chatlog.appendChild(userDiv);
                chatlog.scrollTop = chatlog.scrollHeight;

                userInputField.value = '';

                // Show typing indicator (optional upgrade)

                fetch("{{ url_for('main.chatbot_message_api') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMessage })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.response) {
                            const botDiv = document.createElement('div');
                            botDiv.className = 'bot-message fade-up';
                            botDiv.innerHTML = `<div class="message-content"><strong>MaaSakhi:</strong> ${data.response.replace(/\n/g, '<br>')}</div>`;
                            chatlog.appendChild(botDiv);
                        } else {
                            displayMessage('bot-message', "<strong>System Error:</strong> " + (data.error || "Unknown error"));
                        }
                        chatlog.scrollTop = chatlog.scrollHeight;
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        displayMessage('bot-message', "<strong>Connection Failure:</strong> " + error.message);
                    });
            }
        };
    });
</script>
{% endblock %}
